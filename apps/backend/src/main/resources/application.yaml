# Bezpečné development defaults (repository-strategy §12).
# Žádné secrets, credentials ani produkční hodnoty (RER-011).
# Environment-specific hodnoty se předávají přes environment proměnné
# nebo Spring profily, nikoli úpravou tohoto souboru.

spring:
  application:
    name: ai-trainer-backend
  datasource:
    # Development defaults odpovídají lokálnímu compose.yaml. Nejsou to
    # produkční credentials a produkce je vždy přepíše env proměnnými.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aitrainer}
    username: ${DATABASE_USER:aitrainer}
    password: ${DATABASE_PASSWORD:aitrainer-local-dev}
    hikari:
      # Bounded čekání na connection, aby readiness check neblokoval
      # (r0-api-contract §13.2 — timeouty).
      connection-timeout: ${DATABASE_CONNECT_TIMEOUT_MS:5000}
  flyway:
    # Migrace se balí z kanonického database/migrations (viz build.gradle.kts).
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

aitrainer:
  service:
    name: ai-trainer-backend
    version: ${AITRAINER_SERVICE_VERSION:0.0.1-dev}

logging:
  pattern:
    # requestId z MDC koreluje logy s X-Request-Id odpovědi (APR-007).
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX, UTC} %-5level [%thread] [%X{requestId:-}] %logger{36} - %msg%n"
