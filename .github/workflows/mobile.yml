# Mobile gates (R0-06): format, analyze, test, Android build, iOS build.
# Lokální ekvivalenty příkazů viz apps/mobile/README.md — CI spouští
# stejné příkazy z čistého checkoutu.
name: mobile

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: apps/mobile

jobs:
  analyze-test-android:
    name: Format, analyze, test, Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true
      # pub get také vygeneruje lokalizace (generate: true) — generovaný
      # výstup není commitovaný a vzniká standardním Flutter procesem.
      - name: Resolve dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Run tests
        run: flutter test
      - name: Build Android APK (debug)
        run: flutter build apk --debug

  ios-build:
    name: iOS build (no codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true
      - name: Resolve dependencies
        run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
