# Repository gates (R0-06): struktura, artefakty, secrets, Compose validace.
# Lokální ekvivalenty: ./tooling/scripts/repo-smoke-check.sh,
# docker run ... gitleaks (viz README), docker compose config -q.
name: repository

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: repository-${{ github.ref }}
  # Běhy na main se neruší — slouží jako release evidence.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  smoke-check:
    name: Repository smoke check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run repository smoke check
        run: ./tooling/scripts/repo-smoke-check.sh

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Plná historie: sken pokrývá i dříve commitnuté secrets.
          fetch-depth: 0
      - name: Run gitleaks (pinned v8.30.1)
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git . --redact --no-banner --exit-code 1 2>&1 | tee gitleaks.log
          # Ochrana proti tichému no-op skenu: musí být skenován >0 commitů.
          grep -qE "[1-9][0-9]* commits scanned" gitleaks.log

  compose-validation:
    name: Compose config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose.yaml
        run: docker compose config -q
